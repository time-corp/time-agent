permissions:
  contents: write

name: Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      build_app:
        description: "Build app"
        type: boolean
        default: false

jobs:
  build-app:
    if: >
      github.event_name == 'push' ||
      github.event_name == 'release' ||
      github.event.inputs.build_app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            timecorp/time-agent:${{ steps.version.outputs.tag }}
            timecorp/time-agent:latest
      - name: Show image size
        run: |
          echo "=== Image Size ==="
          docker manifest inspect timecorp/time-agent:${{ steps.version.outputs.tag }} -v | \
            grep -E '"size"|"platform"' || \
            echo "Use Docker Hub to check compressed size"
          echo ""
          echo "Check: https://hub.docker.com/r/timecorp/time-agent/tags"
